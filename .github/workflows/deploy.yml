name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install
        working-directory: project/frontend

      - name: Build
        run: npm run build
        working-directory: project/frontend
        env:
          VITE_API_URL: https://interviewiq-production-e6c9.up.railway.app/api

      - name: Copy index.html to 404.html for SPA routing
        run: cp project/frontend/dist/index.html project/frontend/dist/404.html

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: project/frontend/dist
